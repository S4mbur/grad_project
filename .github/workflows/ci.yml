name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syntax check
        run: python -m compileall app scripts tests

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scikit-learn flask flask-cors pillow pytest

      - name: Run lightweight unit tests
        run: |
          python -m pytest \
            tests/test_similarity_metrics.py \
            tests/test_phase1_safety.py \
            tests/test_app_routes_smoke.py
