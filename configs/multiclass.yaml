# =============================================================================
# Multi-Class Skin Cancer WSI Classification Configuration
# Supports: Normal, BCC, Melanoma (SCC coming later)
# =============================================================================

# Project info
project:
  name: "multiclass_wsi_classification"
  description: "Multi-class WSI classification for skin cancer detection"
  version: "2.0.0"

# Paths
paths:
  data_root: "data"
  raw_wsi_dir: "data/raw_wsi"
  tiles_dir: "data/tiles_multiclass"
  manifests_dir: "data/manifests"
  logs_dir: "logs"
  checkpoints_dir: "logs/checkpoints"
  
# Dataset configuration - Multi-class
dataset:
  name: "multiclass_skin_cancer"
  # Multi-source: COBRA + TCGA-SKCM + (later) UQ NMSC
  sources:
    cobra:
      type: "local"
      path: "data/raw_wsi"
      format: "tif"
    tcga:
      type: "local"  # Downloaded from GDC
      path: "data/raw_wsi"
      format: "svs"
    # uq_nmsc:  # SCC - will be added later
    #   type: "local"
    #   path: "data/raw_wsi/uq"
    #   format: "tif"
  
  # Label mapping for multi-class
  labels:
    0: "normal"
    1: "bcc"
    2: "melanoma"
    # 3: "scc"  # Will be added with UQ NMSC
  
  classes: ["normal", "bcc", "melanoma"]
  num_classes: 3
  
  # Class weights for imbalanced data (will be computed dynamically)
  use_class_weights: true

# Tile extraction configuration
tile_extraction:
  tile_size: 512            # Output tile size in pixels
  target_mpp: 0.5           # Target microns per pixel (~20x magnification)
  max_tiles_per_slide: 500  # Maximum tiles to extract per slide
  min_tissue_fraction: 0.3  # Minimum tissue content in tile
  blur_threshold: 80.0      # Laplacian variance threshold for blur detection
  jpeg_quality: 90
  seed: 42

# Model configuration
model:
  architecture: "resnet18"
  pretrained: true
  num_classes: 3            # Updated for multi-class
  dropout: 0.5

# Training configuration
training:
  batch_size: 32
  num_workers: 4
  learning_rate: 0.0001
  weight_decay: 0.0001
  epochs: 30
  early_stopping_patience: 7
  
  # Multi-class specific
  loss_function: "cross_entropy"  # or "focal_loss" for imbalanced data
  
  # Learning rate scheduler
  scheduler:
    type: "cosine"
    min_lr: 0.000001
  
  # Data augmentation
  augmentation:
    horizontal_flip: true
    vertical_flip: true
    rotation: 15
    color_jitter: true
    random_crop: false

# Image transforms
transforms:
  train:
    resize: 256
    crop: 224
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
  eval:
    resize: 256
    crop: 224
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# Inference configuration
inference:
  batch_size: 64
  aggregation_method: "attention"  # or "mean", "max", "percentile"
  
  # For percentile method
  percentile:
    threshold: 90
    min_positive_ratio: 0.1

# Evaluation configuration  
evaluation:
  metrics:
    - accuracy
    - balanced_accuracy
    - f1_macro
    - f1_weighted
    - auc_ovr        # One-vs-Rest AUC for multi-class
    - confusion_matrix
    - per_class_precision
    - per_class_recall
  
  # Per-class metrics
  report_per_class: true

# Stain normalization (for multi-source data)
stain_normalization:
  enabled: false           # Enable when combining multiple sources
  method: "macenko"        # or "reinhard"
  reference_slide: null    # Path to reference slide for normalization
